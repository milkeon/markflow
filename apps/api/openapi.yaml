components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              enum:
              - VALIDATION_ERROR
              - UNAUTHORIZED
              - FORBIDDEN
              - NOT_FOUND
              - CONFLICT
              - UNPROCESSABLE
              - INTERNAL
              example: FORBIDDEN
            message:
              type: string
              example: 이 작업을 수행할 권한이 없습니다.
            details:
              type:
              - object
              - array
              - string
              - 'null'
              example: null
    User:
      type: object
      required:
      - id
      - email
      - name
      properties:
        id: *id003
        email:
          type: string
          format: email
          example: user@markflow.app
        name:
          type: string
          example: 임민규
    SignupRequest:
      type: object
      required:
      - name
      - email
      - password
      properties:
        name:
          type: string
          example: 임민규
        email:
          type: string
          format: email
          example: user@markflow.app
        password:
          type: string
          minLength: 8
          format: password
          example: secret123
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: user@markflow.app
        password:
          type: string
          format: password
          example: secret123
    AuthResponse:
      type: object
      required:
      - accessToken
      - user
      properties:
        accessToken:
          type: string
          example: eyJhbGci...
        user:
          $ref: '#/components/schemas/User'
    RefreshResponse:
      type: object
      required:
      - accessToken
      properties:
        accessToken:
          type: string
          example: eyJhbGci...
    ProjectSummary:
      type: object
      required:
      - id
      - name
      - role
      - isOwner
      - nodeCount
      - updatedAt
      properties:
        id: *id003
        name:
          type: string
          example: 제품 로드맵
        role: &id010
          type: string
          enum:
          - OWNER
          - EDITOR
          - VIEWER
          example: OWNER
        isOwner:
          type: boolean
          example: true
        nodeCount:
          type: integer
          minimum: 0
          example: 5
        updatedAt: &id008
          type: string
          format: date-time
          example: '2026-06-23T08:30:00.000Z'
    ProjectsResponse:
      type: object
      required:
      - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectSummary'
    ProjectCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 120
          example: 새 프로젝트
    ProjectUpdateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          maxLength: 120
          example: 변경된 이름
    ProjectUpdateResponse:
      type: object
      required:
      - id
      - name
      - updatedAt
      properties:
        id: *id003
        name:
          type: string
          example: 변경된 이름
        updatedAt: *id008
    ProjectDeleteResponse:
      type: object
      required:
      - id
      - deletedAt
      properties:
        id: *id003
        deletedAt: *id008
    ProjectRestoreResponse:
      type: object
      required:
      - id
      - deletedAt
      properties:
        id: *id003
        deletedAt:
          type:
          - string
          - 'null'
          format: date-time
          example: null
    DeletedProject:
      type: object
      required:
      - id
      - name
      - deletedAt
      - isOwner
      properties:
        id: *id003
        name:
          type: string
          example: 블로그 초안
        deletedAt: *id008
        isOwner:
          type: boolean
          example: true
    ProjectsTrashResponse:
      type: object
      required:
      - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/DeletedProject'
    PurgeResponse:
      type: object
      required:
      - id
      - purged
      properties:
        id: *id003
        purged:
          type: boolean
          example: true
    Position:
      type: object
      required:
      - x
      - y
      properties:
        x:
          type: number
          format: double
          example: 120
        y:
          type: number
          format: double
          example: 80
    Node:
      type: object
      required:
      - id
      - type
      - title
      - markdown
      - collapsed
      - position
      - updatedAt
      properties:
        id: *id003
        type: &id009
          type: string
          enum:
          - idea
          - doc
          - task
          - decision
          - data
          example: idea
        title:
          type: string
          example: 킥오프
        markdown:
          type: string
          example: '# 킥오프\n- 목표 정리'
        collapsed:
          type: boolean
          example: true
        position:
          $ref: '#/components/schemas/Position'
        updatedAt: *id008
    NodeCreateRequest:
      type: object
      required:
      - title
      - markdown
      - type
      - position
      properties:
        title:
          type: string
          example: 새 노드
        markdown:
          type: string
          example: ''
        type: *id009
        position:
          $ref: '#/components/schemas/Position'
    NodeUpdateRequest:
      type: object
      description: 부분 갱신 허용. 위치만 변경하면 MOVE, 그 외 변경은 UPDATE 활동 로그로 기록한다.
      properties:
        title:
          type: string
          example: 수정
        markdown:
          type: string
          example: '...'
        type: *id009
        collapsed:
          type: boolean
          example: false
        position:
          $ref: '#/components/schemas/Position'
    NodeDeleteResponse:
      type: object
      required:
      - id
      - deletedAt
      properties:
        id: *id003
        deletedAt: *id008
    NodeRestoreResponse:
      type: object
      required:
      - id
      - deletedAt
      properties:
        id: *id003
        deletedAt:
          type:
          - string
          - 'null'
          format: date-time
          example: null
    TrashNode:
      type: object
