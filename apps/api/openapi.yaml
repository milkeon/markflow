      - id
      - title
      - type
      - deletedAt
      properties:
        id: *id003
        title:
          type: string
          example: 노드 스키마
        type: *id009
        deletedAt: *id008
    ProjectTrashResponse:
      type: object
      required:
      - nodes
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TrashNode'
    Edge:
